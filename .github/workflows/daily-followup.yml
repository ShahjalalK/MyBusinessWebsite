name: Semi-Hourly Follow-up Job

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর চলবে (যেমন ১:০০, ১:৩০, ২:০০)
  workflow_dispatch: # ম্যানুয়ালি চালানোর অপশন

jobs:
  run-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Follow-up API
        run: |
          curl -X GET "https://www.trackflowpro.com/api/cron/follow-up"