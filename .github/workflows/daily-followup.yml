name: Hourly Follow-up Job

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  run-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Follow-up API
        run: |
          curl -X GET "https://www.trackflowpro.com/api/cron/follow-up" \
          -H "x-cron-auth: ${{ secrets.CRON_SECRET }}"